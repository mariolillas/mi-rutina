<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi Rutina</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#0f1115; --card:#1a1e26; --card2:#222734; --line:#2b3140;
  --txt:#f2f4f8; --sub:#8b919e; --accent:#d7ff3f; --accent-dark:#9fc41a;
  --green:#3ddc84; --red:#ff5d5d; --orange:#ffb74d;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  overscroll-behavior:none;-webkit-user-select:none;user-select:none}
#app{max-width:520px;margin:0 auto;min-height:100%;padding:env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom));position:relative}
h1{font-size:26px;font-weight:800}
h2{font-size:19px;font-weight:800}
.sub{color:var(--sub);font-size:13px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--sub)}
.chip.acc{background:rgba(215,255,63,.12);color:var(--accent)}
.chip.warn{background:rgba(255,183,77,.12);color:var(--orange)}
.card{background:var(--card);border-radius:20px;padding:18px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:18px;
  background:var(--accent);color:#10130a;font-size:17px;font-weight:800;padding:17px;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--card2);color:var(--txt)}
.btn.small{width:auto;padding:11px 20px;font-size:14px;border-radius:14px}
.row{display:flex;align-items:center;gap:12px}
.grow{flex:1;min-width:0}
.gifbox{background:#fff;border-radius:18px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.gifbox img{width:100%;height:100%;object-fit:contain;display:block}
.thumb{width:64px;height:64px;border-radius:14px;flex-shrink:0;background:#fff}
.thumb img{width:100%;height:100%;object-fit:cover;border-radius:14px}
header.app{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px}
.iconbtn{background:var(--card);border:none;color:var(--txt);width:42px;height:42px;border-radius:13px;
  font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.fade{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pulse{animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
/* progress bar */
.pbar{height:6px;background:var(--card2);border-radius:99px;overflow:hidden}
.pbar>div{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
/* segmented progress bar (un bloque por ejercicio) */
.segbar{display:flex;gap:4px;width:100%}
.segbar .seg{flex:1;height:6px;border-radius:99px;background:var(--card2);overflow:hidden}
.segbar .seg>i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
/* week strip */
.sesrow{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:18px;padding:14px;margin-bottom:10px;cursor:pointer}
.sesrow .badge{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--card2);flex-shrink:0}
.sesrow.done{opacity:.55}
.checkmark{color:var(--green);font-size:20px;font-weight:800}
/* exercise list */
.exrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.exrow:last-child{border-bottom:none}
.exrow .nm{font-size:15px;font-weight:700;line-height:1.25}
.exrow .dt{font-size:12.5px;color:var(--sub);margin-top:2px}
/* workout player */
.player{display:flex;flex-direction:column;min-height:100dvh;padding:env(safe-area-inset-top) 0 calc(12px + env(safe-area-inset-bottom))}
.bigring{position:relative;width:230px;height:230px;margin:0 auto}
.bigring svg{transform:rotate(-90deg)}
.bigring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bigring .tnum{font-size:58px;font-weight:800;font-variant-numeric:tabular-nums}
.setdots{display:flex;gap:7px;justify-content:center}
.setdots span{width:9px;height:9px;border-radius:99px;background:var(--card2)}
.setdots span.on{background:var(--accent)}
.setdots span.cur{outline:2px solid var(--accent);outline-offset:2px;background:var(--card2)}
.notebox{background:rgba(215,255,63,.07);border:1px solid rgba(215,255,63,.18);border-radius:14px;padding:10px 13px;font-size:13px;color:#d9e2bf;line-height:1.45}
/* prep overlay */
.overlay{position:fixed;inset:0;background:rgba(10,12,16,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50}
.overlay .n{font-size:120px;font-weight:800;color:var(--accent)}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line);font-size:14.5px}
.hist-row:last-child{border-bottom:none}
/* lightbox de GIF */
.lightbox{position:fixed;inset:0;background:rgba(8,10,14,.94);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;z-index:80;padding:calc(64px + env(safe-area-inset-top)) 20px calc(24px + env(safe-area-inset-bottom));animation:fade .2s ease;cursor:zoom-out;overflow-y:auto;-webkit-overflow-scrolling:touch}
.lightbox .lb-inner{width:min(92vw,520px);margin:auto 0;cursor:default}
.lightbox .lb-img{width:100%;aspect-ratio:1;background:#fff;border-radius:22px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.lightbox.has-steps .lb-img{width:min(64vw,300px);margin:0 auto;aspect-ratio:1}
.lightbox .lb-img img{width:100%;height:100%;object-fit:contain}
.lightbox .lb-name{margin-top:16px;font-size:18px;font-weight:800;text-align:center;color:var(--txt)}
.lightbox .lb-note{margin-top:8px;font-size:13px;color:var(--sub);text-align:center;line-height:1.45}
.lightbox .lb-steps{margin-top:18px;list-style:none;text-align:left;counter-reset:step}
.lightbox .lb-steps li{counter-increment:step;display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;line-height:1.45;color:var(--txt)}
.lightbox .lb-steps li:last-child{border-bottom:none}
.lightbox .lb-steps li::before{content:counter(step,decimal-leading-zero);color:var(--accent);font-weight:800;font-variant-numeric:tabular-nums;flex-shrink:0;min-width:24px}
.lightbox .lb-steps li>span{flex:1;min-width:0}
.lightbox .lb-close{position:fixed;top:calc(16px + env(safe-area-inset-top));right:16px;z-index:1}
/* toast */
.toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:var(--accent);color:#10130a;font-weight:800;font-size:14px;padding:12px 18px;border-radius:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:90;animation:toastIn .3s ease}
.toast.out{animation:toastOut .4s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,12px)}}
.statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.statgrid .card{padding:14px 10px;text-align:center}
.statgrid .v{font-size:21px;font-weight:800;color:var(--accent)}
.statgrid .l{font-size:11px;color:var(--sub);margin-top:3px}
/* captura de peso/reps */
.caprow{display:flex;gap:12px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.capbox{background:var(--card);border-radius:14px;padding:10px 14px;min-width:130px}
.caplbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--sub)}
.capctl{display:flex;align-items:center;gap:10px;margin-top:6px}
.capctl button{width:36px;height:36px;border-radius:10px;border:none;background:var(--card2);color:var(--txt);
  font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;line-height:1}
.capctl button:active{transform:scale(.92)}
.capval{flex:1;text-align:center;font-size:19px;font-weight:800;font-variant-numeric:tabular-nums}
.capval .unit{font-size:12px;color:var(--sub);font-weight:600}
/* toggle Modo Viaje */
.travelbar{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:13px 16px;margin-bottom:14px;cursor:pointer;border:1px solid transparent;transition:border-color .2s,background .2s}
.travelbar.on{border-color:rgba(215,255,63,.4);background:linear-gradient(145deg,#222a14,#1a1e26)}
.switch{width:46px;height:27px;border-radius:99px;background:var(--card2);position:relative;flex-shrink:0;transition:background .2s}
.switch.on{background:var(--accent)}
.switch>i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:99px;background:#fff;transition:transform .2s}
.switch.on>i{transform:translateX(19px)}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   DATOS DE LA RUTINA — Ciclo 90 días
   Fuente: 🏋️ Rutina de Entrenamiento v2.md (fija, no editable)
   ============================================================ */
const CYCLE = { start: "2026-06-13", end: "2026-09-03", weeks: 12 };
const APP_VERSION = "v14"; // debe coincidir con VERSION en sw.js (rutina-vN)

const PHASES = [
  { from: 1, to: 3,  label: "Técnica",   tip: "Aprende los movimientos con técnica correcta" },
  { from: 4, to: 6,  label: "Sube reps", tip: "Aumenta 1-2 reps por ejercicio donde puedas" },
  { from: 7, to: 9,  label: "Pico",      tip: "Pico del ciclo — sube peso donde la técnica lo permita" },
  { from: 10, to: 12,label: "Mantén",    tip: "Mantén intensidad máxima · Lab control en agosto" },
];

// weight puede ser string o función(week) para progresión automática
const SESSIONS = {
  upperA: {
    name: "Upper A", emoji: "💪", weekday: 1,
    muscles: "Pecho · Espalda · Hombros · Brazos",
    exercises: [
      { name: "Press de pecho en piso", gif: "0289", sets: 4, reps: 10, weight: "15kg", rest: 75,
        note: "En el piso con mancuernas (el GIF muestra banco — mismo movimiento)" },
      { name: "Remo a un brazo", gif: "0292", sets: 4, reps: 10, perSide: true, weight: "15kg", rest: 75 },
      { name: "Press militar de pie", gif: "0426", sets: 3, reps: 12, weight: "10kg", rest: 60,
        note: "Codos ligeramente adelante, no completamente abiertos" },
      { name: "Elevaciones laterales", gif: "0334", sets: 3, reps: 15, weight: "10kg", rest: 45, star: true,
        note: "Solo hasta la altura del hombro, baja lento 3 seg" },
      { name: "Curl de bíceps", gif: "0294", sets: 3, reps: 10, weight: "10kg", rest: 45 },
      { name: "Extensión tríceps overhead", gif: "2188", sets: 3, reps: 10, weight: "10kg", rest: 45 },
      { name: "Plancha", gif: "2135", sets: 3, timeSec: 45, rest: 20, core: true },
    ],
  },
  lowerA: {
    name: "Lower A", emoji: "🦵", weekday: 2,
    muscles: "Cuádriceps · Glúteos · Isquios · Pantorrilla",
    exercises: [
      { name: "Sentadilla goblet", gif: "1760", sets: 4, reps: 12, weight: "15kg", rest: 75 },
      { name: "Zancada hacia atrás", gif: "0381", sets: 3, reps: 12, perSide: true, weight: "10kg", rest: 60 },
      { name: "Hip thrust / Puente de caderas", gif: "1409", sets: 4, reps: 15, weight: "15kg", rest: 60,
        note: "Espalda alta en el suelo, mancuerna encima de caderas, aprieta glúteos 1 seg arriba" },
      { name: "Curl de pierna de pie", gif: "0795", sets: 3, reps: 20, perSide: true, weight: "10kg", rest: 45,
        note: "Pared para apoyo, talón al glúteo, baja lento" },
      { name: "Elevación talones una pierna", gif: "0409", sets: 4, reps: 20, perSide: true, weight: "15kg", rest: 30,
        note: "Baja el talón COMPLETAMENTE en cada rep" },
      { name: "Insecto muerto", gif: "0276", sets: 3, reps: 12, rest: 20, core: true },
    ],
  },
  upperB: {
    name: "Upper B", emoji: "💪", weekday: 4,
    muscles: "Pecho · Espalda · Hombros · Brazos (ángulos diferentes)",
    exercises: [
      { name: "Press inclinado en piso", gif: "0314", sets: 4, reps: 10, weight: "15kg", rest: 75,
        note: "Usa el respaldo de un cojín para el ángulo inclinado" },
      { name: "Remo dos manos", gif: "0293", sets: 4, reps: 10, weight: "15kg", rest: 75 },
      { name: "Press Arnold", gif: "2137", sets: 3, reps: 12, weight: "10kg", rest: 60,
        note: "Rota las palmas durante el movimiento — excelente para los 3 deltoides" },
      { name: "Elevaciones laterales", gif: "0334", sets: 3, reps: 15, weight: "10kg", rest: 45, star: true,
        note: "Solo hasta la altura del hombro, baja lento 3 seg" },
      { name: "Curl martillo", gif: "0313", sets: 3, reps: 10, weight: "10kg", rest: 45 },
      { name: "Kickback de tríceps", gif: "0333", sets: 3, reps: 12, weight: "10kg", rest: 45 },
      { name: "Escalador", gif: "0630", sets: 3, reps: 30, rest: 20, core: true },
    ],
  },
  lowerB: {
    name: "Lower B", emoji: "🦵", weekday: 5,
    muscles: "Glúteos · Cuádriceps · Isquios · Pantorrilla",
    exercises: [
      { name: "Sentadilla sumo", gif: "3142", sets: 3, reps: 15, weight: "15kg", rest: 60,
        note: "Con mancuerna al centro (el GIF muestra máquina — misma postura sumo)" },
      { name: "Sentadilla búlgara", gif: "0410", sets: 4, reps: 10, perSide: true, rest: 75, warn: true,
        weightFn: w => w >= 3 ? "15kg" : "10kg",
        note: "Semanas 1-2 con 10kg, desde semana 3 sube a 15kg. Va en posición 2 para calentar el tendón cuadricipital" },
      { name: "Zancada inversa", gif: "0381", sets: 3, reps: 12, perSide: true, weight: "10kg", rest: 60 },
      { name: "Puente glúteos una pierna", gif: "3645", sets: 3, reps: 15, perSide: true, weight: "15kg", rest: 45 },
      { name: "Elevación talones dos piernas", gif: "0417", sets: 4, reps: 25, weight: "15kg", rest: 30,
        note: "Baja el talón COMPLETAMENTE en cada rep" },
      { name: "Plancha estrella", gif: "0705", sets: 3, timeSec: 45, rest: 20, core: true,
        note: "Plancha lateral con brazo y pierna elevados (el GIF muestra la base del movimiento)" },
    ],
  },
};
const ORDER = ["upperA", "lowerA", "upperB", "lowerB"];
const WEEKDAY_MAP = { 1: "upperA", 2: "lowerA", 4: "upperB", 5: "lowerB" };

/* ============================================================
   MODO VIAJE — versión bodyweight (sin equipo)
   Fuente: 🧳 Rutina Modo Viaje v2.md (fija, no editable)
   Mismas claves/días que SESSIONS; miércoles sigue siendo descanso.
   Toggle persistente desde la pantalla de inicio.
   ============================================================ */
const TRAVEL_SESSIONS = {
  upperA: {
    name: "Upper A", emoji: "💪", weekday: 1,
    muscles: "Pecho · Espalda · Hombros · Brazos",
    exercises: [
      { name: "Push-up estándar", gif: "0662", sets: 4, reps: 12, rest: 75,
        note: "Cuerpo recto, baja hasta que el pecho casi toque el suelo" },
      { name: "Superman", gif: "0489", sets: 4, reps: 15, rest: 75,
        note: "Sin banco: boca abajo en el piso, levanta brazos y piernas a la vez y aguanta 1 seg arriba (el GIF muestra banco — mismo movimiento de espalda baja)" },
      { name: "Pike push-up", gif: "1296", sets: 3, reps: 10, rest: 60,
        note: "Sin balón: pies en el piso, cadera bien arriba formando una V, baja la cabeza entre las manos (el GIF usa balón — misma mecánica de hombro)" },
      { name: "Elevación lateral sin peso", gif: "0334", sets: 3, reps: 20, rest: 45, star: true,
        note: "Sin mancuerna: muy lentas y controladas, solo hasta la altura del hombro" },
      { name: "Curl con toalla", gif: "0294", sets: 3, reps: 12, perSide: true, rest: 45,
        note: "Pisa un extremo de la toalla y jala con la mano resistiendo con el pie (el GIF muestra mancuerna)" },
      { name: "Fondos de tríceps en silla", gif: "0129", sets: 3, reps: 12, rest: 45,
        note: "Manos en el borde de la silla, baja flexionando los codos hacia atrás" },
      { name: "Plancha", gif: "2135", sets: 3, timeSec: 45, rest: 20, core: true },
    ],
  },
  lowerA: {
    name: "Lower A", emoji: "🦵", weekday: 2,
    muscles: "Cuádriceps · Glúteos · Isquios · Pantorrilla",
    exercises: [
      { name: "Sentadilla bodyweight", gif: "3533", sets: 4, reps: 20, rest: 75,
        note: "Profunda y controlada, peso en los talones" },
      { name: "Zancada hacia atrás", gif: "0381", sets: 3, reps: 15, perSide: true, rest: 60 },
      { name: "Hip thrust en cama", gif: "1409", sets: 4, reps: 20, rest: 60,
        note: "Espalda alta apoyada en la cama del hotel, sube la cadera apretando glúteos (el GIF usa mancuerna — hazlo sin peso)" },
      { name: "Curl isquiotibial de pie", gif: "0795", sets: 3, reps: 20, perSide: true, rest: 45,
        note: "Sin peso: lleva el talón al glúteo, baja lento" },
      { name: "Elevación talones una pierna", gif: "0409", sets: 4, reps: 25, perSide: true, rest: 30,
        note: "Borde de la tina o escalón; baja el talón COMPLETAMENTE" },
      { name: "Insecto muerto", gif: "0276", sets: 3, reps: 12, rest: 20, core: true },
    ],
  },
  upperB: {
    name: "Upper B", emoji: "💪", weekday: 4,
    muscles: "Pecho · Espalda · Hombros · Brazos (ángulos diferentes)",
    exercises: [
      { name: "Push-up pies elevados en cama", gif: "0279", sets: 4, reps: 10, rest: 75,
        note: "Pies sobre la cama: simula el press inclinado, trabaja el pecho alto" },
      { name: "Extensión dorsal en Y", gif: "0489", sets: 4, reps: 15, rest: 75,
        note: "Boca abajo en el piso, brazos extendidos en forma de Y; levanta y baja controlado (el GIF muestra banco — mismo movimiento)" },
      { name: "Push-up wide", gif: "1311", sets: 3, reps: 12, rest: 60,
        note: "Manos más anchas que los hombros, más énfasis en el pecho" },
      { name: "Elevación lateral sin peso", gif: "0334", sets: 3, reps: 20, rest: 45, star: true,
        note: "Sin mancuerna: muy lentas y controladas, solo hasta la altura del hombro" },
      { name: "Curl con toalla", gif: "0294", sets: 3, reps: 12, perSide: true, rest: 45,
        note: "Pisa un extremo de la toalla y jala con la mano resistiendo con el pie (el GIF muestra mancuerna)" },
      { name: "Extensión tríceps overhead con toalla", gif: "2188", sets: 3, reps: 12, rest: 45,
        note: "Toalla detrás de la cabeza, codos fijos, extiende hacia arriba (el GIF muestra mancuerna)" },
      { name: "Escalador", gif: "0630", sets: 3, reps: 30, rest: 20, core: true },
    ],
  },
  lowerB: {
    name: "Lower B", emoji: "🦵", weekday: 5,
    muscles: "Glúteos · Cuádriceps · Isquios · Pantorrilla",
    exercises: [
      { name: "Sentadilla sumo bodyweight", gif: "3142", sets: 3, reps: 20, rest: 60,
        note: "Pies anchos, puntas hacia afuera; sin peso (el GIF muestra máquina — misma postura sumo)" },
      { name: "Sentadilla búlgara en silla", gif: "0410", sets: 4, reps: 12, perSide: true, rest: 75, warn: true,
        note: "Empeine del pie trasero en el asiento de la silla; sin peso, tempo lento" },
      { name: "Zancada inversa", gif: "0381", sets: 3, reps: 15, perSide: true, rest: 60 },
      { name: "Puente glúteos una pierna", gif: "3645", sets: 3, reps: 20, perSide: true, rest: 45,
        note: "Sin peso: una pierna extendida, sube la cadera apretando el glúteo" },
      { name: "Elevación talones dos piernas", gif: "0417", sets: 4, reps: 30, rest: 30,
        note: "Sin escalón puedes hacerla plana con más reps" },
      { name: "Plancha estrella", gif: "0705", sets: 3, timeSec: 45, rest: 20, core: true,
        note: "Plancha lateral con brazo y pierna elevados (el GIF muestra la base del movimiento)" },
    ],
  },
};

/* Modo Viaje: toggle persistente. Cambia el set de rutinas activo (mismas claves/días).
   S() es el set vigente — todo el resto de la app lee de aquí. */
let travelMode = localStorage.getItem("rutina_travel") === "1";
function S(){ return travelMode ? TRAVEL_SESSIONS : SESSIONS; }
function toggleTravel(){
  travelMode = !travelMode;
  localStorage.setItem("rutina_travel", travelMode ? "1" : "0");
  toast(travelMode ? "🧳 Modo Viaje activado — rutina sin equipo" : "🏋️ Modo normal — con mancuernas");
  render();
}

/* Pasos guiados por ejercicio (solo principales). Clave = name exacto de SESSIONS.
   Español, adaptados a la ejecución real de Mario (piso/mancuernas/cojín). */

const DB_KEY = "rutina_v1";
function loadDB(){
  let d; try { d = JSON.parse(localStorage.getItem(DB_KEY)); } catch {}
  if (!d || typeof d !== "object") d = {};
  if (!Array.isArray(d.history)) d.history = [];
  if (!d.last || typeof d.last !== "object") d.last = {}; // último peso/reps por ejercicio (para prellenar)
  return d;
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }

const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbzpZLbZJmSxp0mxTFR-U8Z52BnRz3WAY0Cfx2sDPkAQbhf2GhNjyn3xc304LEnw4NHr/exec";
const QUEUE_KEY = "rutina_queue";
function loadQueue(){ try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; } catch { return []; } }
function saveQueue(q){ localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
function enqueue(p){ const q = loadQueue(); q.push(p); saveQueue(q); }
let flushing = false;
async function flushQueue(){
  if (flushing || !SHEET_ENDPOINT || !navigator.onLine) return;
  let q = loadQueue();
  if (!q.length) return;
  flushing = true;
  const remaining = [];
  let sentAny = false;
  for (const item of q){
    try {
      const res = await fetch(SHEET_ENDPOINT, { method: "POST", body: JSON.stringify(item) }); // text/plain → sin preflight CORS
      if (res.ok) sentAny = true; else remaining.push(item);
    } catch { remaining.push(item); }
  }
  saveQueue(remaining);
  flushing = false;
  if (sentAny && !remaining.length) toast("✓ Avance guardado en la hoja");
}

/* ============================ FECHAS / CICLO ============================ */
function today(){ return new Date(); }
function dateKey(d){ return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function parseKey(k){ const [y,m,d] = k.split("-").map(Number); return new Date(y, m-1, d); }
function mondayOf(d){ const x = new Date(d); const dow = (x.getDay() + 6) % 7; x.setDate(x.getDate() - dow); x.setHours(0,0,0,0); return x; }
function weekKey(d){ return dateKey(mondayOf(d)); }
function cycleWeek(d = today()){
  const start = parseKey(CYCLE.start);
  const diff = Math.floor((mondayOf(d) - mondayOf(start)) / (7 * 864e5)) + 1;
  return Math.max(1, Math.min(CYCLE.weeks, diff));
}
function cycleStarted(){ return today() >= parseKey(CYCLE.start); }
function phaseOf(w){ return PHASES.find(p => w >= p.from && w <= p.to) || PHASES[PHASES.length-1]; }
function exWeight(ex){ return ex.weightFn ? ex.weightFn(cycleWeek()) : (ex.weight || null); }

function doneThisWeek(sid){
  const wk = weekKey(today());
  return db.history.find(h => h.session === sid && weekKey(parseKey(h.date)) === wk);
}
function suggestedSession(){
  const dow = today().getDay();
  const todays = WEEKDAY_MAP[dow];
  if (todays && !doneThisWeek(todays)) return { sid: todays, why: "hoy" };
  for (const sid of ORDER) if (!doneThisWeek(sid)) return { sid, why: todays ? "siguiente" : "adelantar" };
  return null;
}
function estMinutes(s){
  let sec = 0;
  for (const ex of s.exercises){
    const work = ex.timeSec ? ex.timeSec : ex.reps * (ex.perSide ? 6 : 3.2);
    sec += ex.sets * (work + ex.rest) + 25;
  }
  return Math.round(sec / 60 / 5) * 5;
}
function fmtDur(sec){ const m = Math.floor(sec/60), s = sec % 60; return m + ":" + String(s).padStart(2,"0"); }

/* ============================ AUDIO ============================ */
let AC = null;
function audio(){ if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); if (AC.state === "suspended") AC.resume(); return AC; }
function beep(freq = 880, dur = 0.12, vol = 0.2){
  try {
    const ctx = audio(), o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = freq;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch {}
}
function beepFinal(){ beep(1175, 0.16, 0.25); setTimeout(() => beep(1568, 0.3, 0.25), 170); }

  clearTimers();

}

}

function openFlowGif(kind, type, i){ openGifObj((kind === "warmup" ? WARMUP : COOLDOWN)[type][i]); }
function openGifObj(ex){

}
function closeGif(){ const lb = document.querySelector(".lightbox"); if (lb) lb.remove(); }

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.classList.add("out"); setTimeout(() => t.remove(), 400); }, 2600);
}

function bump(field, delta){
  const w = state.w; if (!w || !w.cur) return;
  if (field === "weight"){
    w.cur.weight = Math.max(0, Math.round((w.cur.weight + delta) * 10) / 10);
    const el = document.getElementById("capW"); if (el) el.textContent = w.cur.weight;
  } else {
    w.cur.reps = Math.max(0, w.cur.reps + delta);
    const el = document.getElementById("capR"); if (el) el.textContent = w.cur.reps;
  }
}

function exDetail(ex){
  const w = exWeight(ex);
  const parts = [];
  parts.push(ex.timeSec ? `${ex.sets}×${ex.timeSec}seg` : `${ex.sets}×${ex.reps}${ex.perSide ? " c/lado" : ""}`);
  if (w) parts.push(w);
  parts.push(`descanso ${ex.rest}s`);
  return parts.join(" · ");
}

/* Barra de progreso segmentada: un bloque por ejercicio principal.
   Cada bloque se rellena según las series completadas de ese ejercicio. */
function segBar(w, s){
  const segs = s.exercises.map((ex, i) => {
    let pct = 0;
    if (i < w.exIdx) pct = 100;
    else if (i === w.exIdx) pct = Math.min(100, (w.setIdx / ex.sets) * 100);
    return `<div class="seg"><i style="width:${pct}%"></i></div>`;
  }).join("");
  return `<div class="segbar">${segs}</div>`;
}
function workoutTopBar(w, s, elapsed){
  return `<div class="row" style="padding:12px 0 10px">
      <button class="iconbtn" onclick="confirmExit()">✕</button>
      <div class="grow">${segBar(w, s)}</div>
      <span class="chip" id="clock">⏱ ${elapsed}</span>
    </div>`;
}

/* ============================ WORKOUT ENGINE ============================ */
let timers = [];
function clearTimers(){ timers.forEach(clearInterval); timers.forEach(clearTimeout); timers = []; }

/* --- Calentamiento / enfriamiento guiado (reproductor de movimientos por tiempo) --- */
function startSession(sid){
  audio();
  state.flow = { kind: "warmup", sid, list: WARMUP[sessionType(sid)], idx: 0 };
  lockScreen();
  go("flow");
}
function startCooldown(sid){
  audio();
  state.flow = { kind: "cooldown", sid, list: COOLDOWN[sessionType(sid)], idx: 0 };
  lockScreen();
  go("flow");
}
function flowDone(){
  const f = state.flow; state.flow = null;
  if (f.kind === "warmup") return startWorkout(f.sid); // tras calentar → entrenamiento
  unlockScreen(); go("home");                          // tras enfriar → inicio
}
function flowSkip(){
  const f = state.flow;
  if (f.kind === "warmup"){ state.flow = null; return startWorkout(f.sid); }
  flowDone();
}
function flowExit(){
  clearTimers();
  if (confirm("¿Salir?")){ state.flow = null; unlockScreen(); go("home"); }
}
function renderFlow(){
  const f = state.flow; if (!f) return go("home");
  const mv = f.list[f.idx], isWarm = f.kind === "warmup";
  const total = mv.perSide ? mv.sec * 2 : mv.sec;
  $app.innerHTML = `
  <div class="player fade">
    <div class="row" style="padding:12px 0 10px">
      <button class="iconbtn" onclick="flowExit()">✕</button>
      <div class="grow" style="text-align:center">
        <div class="sub" style="font-weight:700;letter-spacing:.12em;font-size:12px;color:${isWarm ? "var(--accent)" : "#3ddc84"}">
          ${isWarm ? "🔥 CALENTAMIENTO" : "🧊 ENFRIAMIENTO"}</div>
      </div>
      <div style="width:42px"></div>
    </div>
    <div class="gifbox" style="aspect-ratio:1.15;max-height:42dvh"><img src="gifs/${mv.gif}.gif" alt="${mv.name}"></div>
    <div style="text-align:center;margin-top:14px">
      <div class="sub" style="font-weight:700;letter-spacing:.08em;font-size:12px">MOVIMIENTO ${f.idx + 1} DE ${f.list.length}</div>
      <h1 style="margin-top:5px;font-size:23px;line-height:1.2">${mv.name}</h1>
      <div style="margin-top:10px;font-size:19px;font-weight:800">${mv.perSide ? mv.sec + " seg c/lado" : mv.sec + " seg"}</div>
      ${mv.perSide ? `<div class="chip" style="margin-top:8px">🔄 Cambia de lado a la mitad</div>` : ""}
      ${mv.note ? `<div class="notebox" style="margin-top:10px;text-align:left">💡 ${mv.note}</div>` : ""}
    </div>
    <div class="grow"></div>
    <div style="padding-top:14px;display:flex;gap:10px">
      <button class="btn ghost" style="flex:1" onclick="flowSkip()">Saltar ${isWarm ? "calent." : "enfri."} ›</button>
      <button class="btn" style="flex:1.6" onclick="flowPrep()">▶ Empezar ${total} seg</button>
    </div>
  </div>`;
}
function flowPrep(){
  let n = 3;
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="sub" style="font-size:15px;font-weight:700;margin-bottom:8px">PREPÁRATE</div><div class="n">${n}</div>`;
  document.body.appendChild(ov);
  beep(660, 0.1);
  const id = setInterval(() => {
    n--;
    if (n > 0){ ov.querySelector(".n").textContent = n; beep(660, 0.1); }
    else { clearInterval(id); ov.remove(); beep(1175, 0.18, 0.25); flowCountdown(); }
  }, 1000);
  timers.push(id);
}
function flowCountdown(){
  const f = state.flow, mv = f.list[f.idx], isWarm = f.kind === "warmup";
  const total = mv.perSide ? mv.sec * 2 : mv.sec;
  const deadline = Date.now() + total * 1000;
  let lastBeeped = 99, switched = false;
  $app.innerHTML = `
  <div class="player fade" style="justify-content:center;text-align:center">
    <div class="sub" style="font-weight:700;letter-spacing:.1em;font-size:12px">${mv.name.toUpperCase()}</div>
    <div class="bigring" style="margin-top:24px">
      ${ringSVG(isWarm ? "#d7ff3f" : "#3ddc84")}
      <div class="mid"><div class="tnum" id="tnum">${total}</div><div class="sub">segundos</div></div>
    </div>
    ${mv.perSide ? `<div class="chip" id="sideChip" style="margin-top:18px">Lado 1 — cambia al sonar</div>` : ""}
    <div style="margin-top:22px;padding:0 4px"><button class="btn ghost" onclick="flowAdvance()">Saltar movimiento ›</button></div>
  </div>`;
  const circ = document.querySelector(".bigring .fg");
  const id = setInterval(() => {
    const left = Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
    const el = document.getElementById("tnum");
    if (el) el.textContent = left;
    if (circ) circ.style.strokeDashoffset = (1 - left / total) * 660;
    if (mv.perSide && !switched && left <= mv.sec){ switched = true; beep(988, 0.2, 0.25);
      const sc = document.getElementById("sideChip"); if (sc) sc.textContent = "Lado 2"; }
    if (left <= 3 && left > 0 && left < lastBeeped){ lastBeeped = left; beep(880, 0.1); }
    if (left <= 0){ clearInterval(id); beepFinal(); flowAdvance(); }
  }, 200);
  timers.push(id);
}
function flowAdvance(){
  clearTimers();
  const f = state.flow; if (!f) return;
  f.idx++;
  if (f.idx >= f.list.length) return flowDone();
  go("flow");
}

function startWorkout(sid){
  audio(); // desbloquea audio con el gesto del usuario
  const s = S()[sid];
  state.w = {
    sid, exIdx: 0, setIdx: 0,
    phase: "work",
    startTime: Date.now(),
    totalSets: s.exercises.reduce((a, e) => a + e.sets, 0),
    doneSets: 0,
    log: [],
  };
  lockScreen();
  go("workout");
}

function curEx(){ return S()[state.w.sid].exercises[state.w.exIdx]; }

function renderWorkout(){
  const w = state.w; if (!w) return go("home");
  if (w.phase === "work") return renderWorkScreen();
  if (w.phase === "rest") return renderRestScreen();
}

function renderWorkScreen(){
  const w = state.w, s = S()[w.sid], ex = curEx();

  const lastV = db.last[ex.name] || {};
  w.cur = {

  };

        <button onclick="bump('reps',1)">+</button></div></div>
    </div>`;
  $app.innerHTML = `
  <div class="player fade">
    ${workoutTopBar(w, s, elapsed)}

    <div style="position:relative">
      <div class="gifbox" style="aspect-ratio:1.15;max-height:44dvh">
        <img src="gifs/${ex.gif}.gif" alt="${ex.name}">
      </div>
      <button class="iconbtn" style="position:absolute;top:8px;left:8px;width:38px;height:38px;background:rgba(15,17,21,.72);font-style:normal;font-weight:800" onclick="openGif('${w.sid}',${w.exIdx})" aria-label="Ver pasos">ⓘ</button>
    </div>

    <div style="text-align:center;margin-top:14px">
      <div class="sub" style="font-weight:700;letter-spacing:.08em;font-size:12px">EJERCICIO ${w.exIdx + 1} DE ${s.exercises.length}</div>
      <h1 style="margin-top:5px;font-size:23px;line-height:1.2">${ex.name}${ex.star ? " ⭐" : ""}</h1>
      <div class="setdots" style="margin-top:10px">
        ${Array.from({length: ex.sets}, (_, i) =>
          `<span class="${i < w.setIdx ? "on" : i === w.setIdx ? "cur" : ""}"></span>`).join("")}
      </div>
      <div style="margin-top:12px;font-size:19px;font-weight:800">
        Serie ${w.setIdx + 1} de ${ex.sets} —
        ${isTimed ? `${ex.timeSec} seg` : `objetivo ${ex.reps} reps`}
        ${weight ? ` · <span style="color:var(--accent)">${weight}</span>` : ""}
      </div>
      ${capHTML}
      ${ex.perSide ? `<div class="chip" style="margin-top:8px">🔄 Derecha → izquierda, ambos lados = 1 serie</div>` : ""}
      ${ex.note ? `<div class="notebox" style="margin-top:10px;text-align:left">💡 ${ex.note}</div>` : ""}
    </div>

    <div class="grow"></div>
    <div style="padding-top:14px">
      ${isTimed
        ? `<button class="btn" onclick="startTimedSet()">▶ &nbsp;EMPEZAR ${ex.timeSec} SEG</button>`
        : `<button class="btn" onclick="finishSet()">✓ &nbsp;SERIE HECHA</button>`}
    </div>
  </div>`;
  tickClock();
}

function tickClock(){
  const id = setInterval(() => {
    const el = document.getElementById("clock");
    if (el && state.w) el.textContent = "⏱ " + fmtDur(Math.floor((Date.now() - state.w.startTime) / 1000));
  }, 1000);
  timers.push(id);
}

/* --- ejercicios por tiempo: 3-2-1 y countdown automático --- */
function startTimedSet(){
  const ex = curEx();
  let n = 3;
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `<div class="sub" style="font-size:15px;font-weight:700;margin-bottom:8px">PREPÁRATE</div><div class="n">${n}</div>`;
  document.body.appendChild(ov);
  beep(660, 0.1);
  const id = setInterval(() => {
    n--;
    if (n > 0){ ov.querySelector(".n").textContent = n; beep(660, 0.1); }
    else {
      clearInterval(id);
      ov.remove();
      beep(1175, 0.18, 0.25);
      runTimedCountdown(ex.timeSec);
    }
  }, 1000);
  timers.push(id);
}

function runTimedCountdown(totalSec){
  const w = state.w, ex = curEx();
  const deadline = Date.now() + totalSec * 1000;
  let lastBeeped = 99;
  $app.innerHTML = `
  <div class="player fade" style="justify-content:center;text-align:center">
    <div class="sub" style="font-weight:700;letter-spacing:.1em;font-size:12px">MANTÉN — ${ex.name.toUpperCase()}</div>
    <div class="bigring" style="margin-top:24px">
      ${ringSVG("#d7ff3f")}
      <div class="mid"><div class="tnum" id="tnum">${totalSec}</div><div class="sub">segundos</div></div>
    </div>
    <div style="margin-top:26px;padding:0 4px">
      <button class="btn ghost" onclick="endTimedEarly()">Terminar ya</button>
    </div>
  </div>`;
  const circ = document.querySelector(".bigring .fg");
  const id = setInterval(() => {
    const left = Math.max(0, Math.ceil((deadline - Date.now()) / 1000));
    const el = document.getElementById("tnum");
    if (el) el.textContent = left;
    if (circ) circ.style.strokeDashoffset = (1 - left / totalSec) * 660;
    if (left <= 3 && left > 0 && left < lastBeeped){ lastBeeped = left; beep(880, 0.1); }
    if (left <= 0){ clearInterval(id); beepFinal(); finishSet(); }
  }, 200);
  timers.push(id);
}
function endTimedEarly(){ clearTimers(); finishSet(); }

function ringSVG(color){
  return `<svg width="230" height="230" viewBox="0 0 230 230">
    <circle cx="115" cy="115" r="105" fill="none" stroke="#222734" stroke-width="13"/>
    <circle class="fg" cx="115" cy="115" r="105" fill="none" stroke="${color}" stroke-width="13"
      stroke-linecap="round" stroke-dasharray="660" stroke-dashoffset="0" style="transition:stroke-dashoffset .25s linear"/>
  </svg>`;
}

/* --- completar serie → descanso o fin --- */
function finishSet(){
  clearTimers();
  const w = state.w, s = S()[w.sid], ex = curEx();
  w.doneSets++;
  // registrar lo realizado en esta serie
  const c = w.cur || {};
  const planW = exWeight(ex);
  w.log.push({
    ex: ex.name, set: w.setIdx + 1,
    weight: ex.timeSec || !planW ? null : c.weight,
    reps: ex.timeSec ? null : (c.reps != null ? c.reps : ex.reps),
    sec: ex.timeSec || null,
  });
  if (!ex.timeSec){
    db.last[ex.name] = { weight: planW ? c.weight : undefined, reps: c.reps };
    saveDB(db);
  }
  const lastSetOfEx = w.setIdx >= ex.sets - 1;
  const lastEx = w.exIdx >= s.exercises.length - 1;
  if (lastSetOfEx && lastEx) return finishWorkout();
  w.restFrom = { exIdx: w.exIdx, setIdx: w.setIdx };
  if (lastSetOfEx){ w.exIdx++; w.setIdx = 0; } else { w.setIdx++; }
  w.phase = "rest";
  render();
}

function renderRestScreen(){
  const w = state.w, s = S()[w.sid];
  const restEx = s.exercises[w.restFrom.exIdx];
  const nextEx = curEx();
  const newEx = w.restFrom.exIdx !== w.exIdx;
  const total = restEx.rest;
  w.restDeadline = Date.now() + total * 1000;
  w.restTotal = total;
  let lastBeeped = 99;
  const elapsed = fmtDur(Math.floor((Date.now() - w.startTime) / 1000));

  $app.innerHTML = `
  <div class="player fade">
    ${workoutTopBar(w, s, elapsed)}
    <div class="grow"></div>
    <div style="text-align:center">
    <div class="sub" style="font-weight:700;letter-spacing:.12em;font-size:12px;color:var(--accent)">DESCANSO</div>
    <div class="bigring" style="margin-top:22px">
      ${ringSVG("#3ddc84")}
      <div class="mid"><div class="tnum" id="tnum">${total}</div><div class="sub">seg</div></div>
    </div>

    <div class="card" style="margin-top:26px;text-align:left">
      <div class="sub" style="font-size:11px;font-weight:700;letter-spacing:.1em">SIGUIENTE${newEx ? " EJERCICIO" : ""}</div>
      <div class="row" style="margin-top:8px;cursor:zoom-in" onclick="openGif('${w.sid}',${w.exIdx})">
        <div class="thumb gifbox"><img src="gifs/${nextEx.gif}.gif" alt=""></div>
        <div class="grow">
          <div style="font-weight:800;font-size:15px">${nextEx.name}</div>
          <div class="sub" style="margin-top:2px;font-size:13px">
            Serie ${w.setIdx + 1} de ${nextEx.sets} · ${nextEx.timeSec ? nextEx.timeSec + " seg" : nextEx.reps + " reps"}
            ${exWeight(nextEx) ? " · " + exWeight(nextEx) : ""}
          </div>
        </div>
      </div>
    </div>
    </div>
    <div class="grow"></div>

    <div class="row" style="margin-top:18px;gap:10px">
      <button class="btn ghost" style="flex:1" onclick="addRest()">+15s</button>
      <button class="btn" style="flex:1" onclick="skipRest()">Saltar ›</button>
    </div>
  </div>`;

  const circ = document.querySelector(".bigring .fg");
  const id = setInterval(() => {
    const left = Math.max(0, Math.ceil((w.restDeadline - Date.now()) / 1000));
    const el = document.getElementById("tnum");
    if (el) el.textContent = left;
    const ck = document.getElementById("clock");
    if (ck) ck.textContent = "⏱ " + fmtDur(Math.floor((Date.now() - w.startTime) / 1000));
    if (circ) circ.style.strokeDashoffset = (1 - left / w.restTotal) * 660;
    if (left <= 3 && left > 0 && left < lastBeeped){ lastBeeped = left; beep(880, 0.1); }
    if (left <= 0){ clearInterval(id); beepFinal(); w.phase = "work"; render(); }
  }, 200);
  timers.push(id);
}
function addRest(){ state.w.restDeadline += 15000; state.w.restTotal += 15; }
function skipRest(){ clearTimers(); state.w.phase = "work"; render(); }

function confirmExit(){
  if (confirm("¿Salir del entrenamiento? El progreso de esta sesión se perderá.")){
    clearTimers(); state.w = null; unlockScreen(); go("home");
  }
}

/* ============================ FIN DE SESIÓN ============================ */
function finishWorkout(){
  clearTimers();
  const w = state.w, s = S()[w.sid];
  const dur = Math.floor((Date.now() - w.startTime) / 1000);
  db.history.push({ date: dateKey(today()), session: w.sid, dur, sets: w.doneSets, log: w.log, travel: travelMode });
  saveDB(db);
  // armar fila(s) para la hoja de cálculo y encolar
  enqueue({
    ts: new Date().toISOString(),
    date: dateKey(today()),
    weekday: DAYNAMES[today().getDay()],
    sid: w.sid,
    session: s.name,
    mode: travelMode ? "viaje" : "normal",
    cycleWeek: cycleWeek(),
    durSec: dur,
    durFmt: Math.floor(dur / 60) + "m " + (dur % 60) + "s", // texto, evita que Sheets lo lea como hora
    sets: w.log,
  });
  flushQueue();
  state.finished = { sid: w.sid, dur, sets: w.doneSets };
  state.w = null;
  unlockScreen();
  beepFinal(); setTimeout(beepFinal, 350);
  go("finish");
}

function renderFinish(){
  const f = state.finished, s = S()[f.sid];
  const wkCount = ORDER.filter(doneThisWeek).length;
  $app.innerHTML = `
  <div class="player fade" style="justify-content:center;text-align:center">
    <div style="font-size:74px" class="pulse">🏆</div>
    <h1 style="margin-top:14px;font-size:30px">¡Sesión completa!</h1>
    <div class="sub" style="margin-top:6px;font-size:15px">${s.emoji} ${s.name} · ${s.muscles}</div>
    <div class="statgrid" style="margin-top:26px">
      <div class="card"><div class="v">${fmtDur(f.dur)}</div><div class="l">duración</div></div>
      <div class="card"><div class="v">${f.sets}</div><div class="l">series</div></div>
      <div class="card"><div class="v">${wkCount}/4</div><div class="l">semana</div></div>
    </div>
    ${wkCount === 4 ? `<div class="chip acc" style="margin-top:18px">🔥 ¡Semana completa! Las 4 sesiones hechas</div>` : ""}
    <div style="margin-top:30px;display:flex;flex-direction:column;gap:10px">
      <button class="btn" onclick="startCooldown('${f.sid}')">🧊 &nbsp;ENFRIAMIENTO (estiramientos)</button>
      <button class="btn ghost" onclick="go('home')">Listo, terminar</button>
    </div>
  </div>`;
}

/* ============================ HISTORIAL ============================ */
function renderHistory(){
  const hist = [...db.history].reverse();
  const weeks = {};
  db.history.forEach(h => { const k = weekKey(parseKey(h.date)); weeks[k] = (weeks[k] || 0) + 1; });
  const fullWeeks = Object.values(weeks).filter(n => n >= 4).length;
  $app.innerHTML = `
    <header class="app">
      <button class="iconbtn" onclick="go('home')">←</button>
      <h2>Historial</h2>
      <div style="width:42px"></div>
    </header>
    <div class="statgrid" style="margin-bottom:16px">
      <div class="card"><div class="v">${db.history.length}</div><div class="l">sesiones</div></div>
      <div class="card"><div class="v">${fullWeeks}</div><div class="l">semanas 4/4</div></div>
      <div class="card"><div class="v">${db.history.length ? fmtDur(Math.round(db.history.reduce((a,h) => a + h.dur, 0) / db.history.length)) : "—"}</div><div class="l">promedio</div></div>
    </div>
    <div class="card fade">
      ${hist.length === 0 ? `<div class="sub" style="text-align:center;padding:20px">Aún no hay sesiones registradas.<br>¡Empieza hoy! 💪</div>`
        : hist.map(h => {
          const s = (h.travel ? TRAVEL_SESSIONS : SESSIONS)[h.session], d = parseKey(h.date);
          return `<div class="hist-row">
            <div><b>${s.emoji} ${s.name}${h.travel ? " 🧳" : ""}</b><div class="sub" style="font-size:12px;margin-top:2px">${DAYNAMES[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}</div></div>
            <div style="text-align:right"><b>${fmtDur(h.dur)}</b><div class="sub" style="font-size:12px;margin-top:2px">${h.sets} series</div></div>
          </div>`;
        }).join("")}
    </div>
    ${hist.length ? `<div style="text-align:center;margin-top:18px">
      <button class="btn ghost small" onclick="if(confirm('¿Borrar todo el historial?')){db.history=[];saveDB(db);render()}">Borrar historial</button>
    </div>` : ""}`;
}

/* ============================ INIT ============================ */
window.startWorkout = startWorkout; window.go = go; window.finishSet = finishSet;
window.startTimedSet = startTimedSet; window.addRest = addRest; window.skipRest = skipRest;
window.confirmExit = confirmExit; window.endTimedEarly = endTimedEarly;
window.bump = bump;
window.openFlowGif = openFlowGif;
window.startSession = startSession; window.startCooldown = startCooldown;
window.toggleTravel = toggleTravel;
window.flowPrep = flowPrep; window.flowSkip = flowSkip; window.flowExit = flowExit; window.flowAdvance = flowAdvance;
render();
flushQueue();
window.addEventListener("online", flushQueue);
if ("serviceWorker" in navigator && location.protocol !== "file:") {
  // avisa si acabamos de recargar por una actualización
  if (sessionStorage.getItem("justUpdated")) {
    sessionStorage.removeItem("justUpdated");
    toast("✓ Actualizado a la última versión");
  }
  // recarga automática cuando un SW nuevo toma control (actualiza en 1 relanzamiento)
  let swReloaded = false;
  const hadController = !!navigator.serviceWorker.controller;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (swReloaded) return;
    swReloaded = true;
    if (hadController) sessionStorage.setItem("justUpdated", "1"); // solo en updates reales, no en 1ª instalación
    location.reload();
  });
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
